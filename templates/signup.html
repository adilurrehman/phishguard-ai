<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">

<title>Signup</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
{% include '_favicon_links.html' %}

</head>

<body class="d-flex flex-column min-vh-100">

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="col-md-5">

<div class="card p-5 shadow-lg">

<h2 class="text-center mb-4">
Create Account
</h2>

<form method="POST">

<div class="mb-3">

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>

<div class="mb-3">

<input
type="email"
name="email"
class="form-control"
placeholder="Email"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<div class="d-grid">

<button type="submit" class="btn btn-primary">
Signup
</button>

</div>

</form>

<div class="text-center mt-3">

<a href="/login">
Already have account?
</a>

</div>

</div>

</div>

</div>

{% include 'footer.html' %}
</body>
</html>
