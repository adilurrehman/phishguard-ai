<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">

<title>Signup</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicons/favicon.ico') }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicons/favicon-16x16.png') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicons/favicon-32x32.png') }}">
<link rel="icon" type="image/png" sizes="48x48" href="{{ url_for('static', filename='favicons/favicon-48x48.png') }}">
<link rel="icon" type="image/png" sizes="64x64" href="{{ url_for('static', filename='favicons/favicon-64x64.png') }}">
<link rel="icon" type="image/png" sizes="128x128" href="{{ url_for('static', filename='favicons/favicon-128x128.png') }}">
<link rel="icon" type="image/png" sizes="256x256" href="{{ url_for('static', filename='favicons/favicon-256x256.png') }}">
<link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='favicons/favicon-512x512.png') }}">
<link rel="apple-touch-icon" sizes="57x57" href="{{ url_for('static', filename='favicons/apple-touch-icon-57x57.png') }}">
<link rel="apple-touch-icon" sizes="114x114" href="{{ url_for('static', filename='favicons/apple-touch-icon-114x114.png') }}">
<link rel="apple-touch-icon" sizes="120x120" href="{{ url_for('static', filename='favicons/apple-touch-icon-120x120.png') }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicons/apple-touch-icon.png') }}">

</head>

<body class="d-flex flex-column min-vh-100">

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="col-md-5">

<div class="card p-5 shadow-lg">

<h2 class="text-center mb-4">
Create Account
</h2>

<form method="POST">

<div class="mb-3">

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>

<div class="mb-3">

<input
type="email"
name="email"
class="form-control"
placeholder="Email"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<div class="d-grid">

<button type="submit" class="btn btn-primary">
Signup
</button>

</div>

</form>

<div class="text-center mt-3">

<a href="/login">
Already have account?
</a>

</div>

</div>

</div>

</div>

{% include 'footer.html' %}
</body>
</html>
